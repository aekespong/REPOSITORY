<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Code Viewer - The Digital Archive</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a0a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
      height: 100vh;
      overflow: hidden;
    }

    .viewer-container {
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .viewer-header {
      background: #1a1a1a;
      border-bottom: 1px solid #2a2a2a;
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #e5e2e1;
      font-size: 14px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
    }

    .viewer-header h1 {
      font-size: 16px;
      font-weight: 600;
      margin: 0;
    }

    .viewer-controls {
      display: flex;
      gap: 12px;
    }

    .viewer-controls button {
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      color: #e5e2e1;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s;
    }

    .viewer-controls button:hover {
      background: #353534;
      border-color: #424754;
    }

    .viewer-controls a {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #4d8eff;
      color: #002e6a;
      padding: 6px 12px;
      border-radius: 4px;
      text-decoration: none;
      font-weight: 600;
      font-size: 12px;
      transition: opacity 0.2s;
    }

    .viewer-controls a:hover {
      opacity: 0.9;
    }

    .viewer-content {
      flex: 1;
      overflow: hidden;
      background: #131313;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    .file-info {
      color: #c2c6d6;
      font-size: 12px;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div class="viewer-container">
    <div class="viewer-header">
      <div>
        <h1>📄 Code Viewer</h1>
        <span class="file-info" style="display: block; font-size: 11px; margin-top: 2px;">code.html • The Digital Archive Design</span>
      </div>
      <div class="viewer-controls">
        <button onclick="location.reload()">🔄 Reload</button>
        <a href="code.html" target="_blank">📖 Open Full Page</a>
        <a href=".">📁 Back to Directory</a>
      </div>
    </div>
    <div class="viewer-content">
      <iframe src="code.html" title="The Digital Archive"></iframe>
    </div>
  </div>
</body>
</html>
